name: Sync clan data from dm-game.com

on:
  schedule:
    # Дважды в день: 03:00 и 15:00 UTC
    - cron: "0 3,15 * * *"
  workflow_dispatch: {} # позволяет запустить вручную кнопкой на GitHub

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Step 1 — scan ratings
        run: npx tsx scripts/scan-ratings.ts

      - name: Step 2 — import rating scan
        run: npx tsx scripts/import-rating-scan.ts data/rating-scan.md

      - name: Step 3 — update players from profiles
        run: npx tsx scripts/update-players-from-profiles.ts

      - name: Step 4 — rebuild clan members lists
        run: npx tsx scripts/rebuild-clan-members.ts

      - name: Step 5 — write sync timestamp
        run: npx tsx scripts/write-sync-timestamp.ts

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/clans.json data/players.json data/rating-scan.md data/sync-status.json data/last-sync.json
          if git diff --cached --quiet; then
            echo "Нет изменений в данных — коммит не нужен."
          else
            git commit -m "chore: auto-sync clan data"
            git checkout -- .
            git clean -fd
            git fetch origin main
            git rebase origin/main
            git push
          fi
